<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Fabian Gloeckle</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <!-- Adjust path relative to the blog directory -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/blog.css">

        <script>
            (function () {
                try {
                    var theme = localStorage.getItem('theme');
                    if (theme === 'light' || theme === 'dark') {
                        document.documentElement.setAttribute('data-theme', theme);
                    }
                } catch (e) {
                    // ignore
                }
            })();
        </script>
    
    <!-- MathJax for LaTeX Support -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        options: {
          renderActions: {
            findScript: [10, function (doc) {
              for (const node of document.querySelectorAll('script[type^="math/tex"]')) {
                const display = !!node.type.match(/; *mode=display/);
                const math = new doc.options.MathItem(node.textContent, doc.inputJax[0], display);
                const text = document.createTextNode('');
                node.parentNode.replaceChild(text, node);
                math.start = {node: text, delim: '', n: 0};
                math.end = {node: text, delim: '', n: 0};
                doc.math.push(math);
              }
            }, '']
          }
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <a href="../index.html" class="logo" aria-label="Home">Fabian Gloeckle</a>
            <nav>
                <ul>
                    <li><a href="../assets/CV.pdf" target="_blank">CV</a></li>
                    <li><a href="../index.html#publications">Publications</a></li>
                    <li><a href="../blog.html" class="active">Blog</a></li>
                    <li>
                        <details>
                            <summary aria-label="Settings" title="Settings">⚙</summary>
                            <div class="settings-dropdown" aria-label="Theme">
                                <button type="button" data-set-theme="system">Theme: System</button>
                                <button type="button" data-set-theme="dark">Theme: Dark</button>
                                <button type="button" data-set-theme="light">Theme: Light</button>
                            </div>
                        </details>
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <a href="../blog.html" class="back-link">&larr; Back to all posts</a>
            
            <article>
                <header class="post-header">
                    <h1>{{title}}</h1>
                    <div class="post-meta">Published on {{date}}</div>
                    {{tags}}
                </header>
                
                <div class="post-content">
{{content}}
                </div>
            </article>
        </main>
        
        <footer style="margin-top: 5rem; text-align: center; padding-bottom: 2rem; color: var(--secondary-text); font-size: 0.85rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
            &copy; 2026 Fabian Glöckle.
        </footer>
    </div>

    <script src="../js/theme.js" defer></script>
</body>
</html>
